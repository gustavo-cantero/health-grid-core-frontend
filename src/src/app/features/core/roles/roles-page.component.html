<div class="page-eyebrow">Gestión</div>
<h1 class="page-title">Roles</h1>
<p class="page-subtitle">Definí los roles del sistema y asignales permisos.</p>

<div style="text-align: right; margin-bottom: 16px">
  <button
    type="button"
    class="btn-main"
    *hgHasPermission="'roles:manage'"
    (click)="openCreate.set(true)"
  >
    + Nuevo rol
  </button>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th scope="col">Rol</th>
        <th scope="col">Usuarios</th>
        <th scope="col">Acciones</th>
      </tr>
    </thead>
    <tbody>
      @for (r of paged(); track r.id) {
        <tr>
          <td>
            <span class="badge" [class]="'badge badge-' + r.color">{{ r.name }}</span>
          </td>
          <td>{{ r.userCount }}</td>
          <td>
            <div class="actions">
              <button
                type="button"
                class="btn-outline"
                *hgHasPermission="'roles:manage'"
                (click)="edit(r)"
              >
                Editar
              </button>
              <button
                type="button"
                class="btn-danger"
                *hgHasPermission="'roles:manage'"
                (click)="deleting.set(r)"
              >
                Eliminar
              </button>
            </div>
          </td>
        </tr>
      }
      @if (roles().length === 0) {
        <tr>
          <td colspan="3" class="empty-state">No hay roles definidos.</td>
        </tr>
      }
    </tbody>
  </table>
</div>
<app-pagination [page]="page()" [totalPages]="totalPages()" (pageChange)="page.set($event)" />

<app-role-create-modal
  [open]="openCreate()"
  (close)="openCreate.set(false)"
  (created)="onCreated($event)"
/>

<app-role-edit-modal
  [open]="editing() !== null"
  [role]="editing()"
  (close)="editing.set(null)"
  (updated)="onUpdated($event)"
/>

<app-confirm-delete
  [open]="deleting() !== null"
  entityLabel="rol"
  (cancel)="deleting.set(null)"
  (confirm)="confirmDelete()"
/>
