<div class="page-eyebrow">Gestión</div>
<h1 class="page-title">Permisos</h1>
<p class="page-subtitle">Creá y administrá los permisos que se asignan a los roles.</p>

<div style="text-align:right;margin-bottom:16px">
  <button type="button" class="btn-main" *hgHasPermission="'permissions:manage'" (click)="openCreate.set(true)">+ Nuevo permiso</button>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th scope="col">ID</th>
        <th scope="col">Nombre</th>
        <th scope="col">Usado en roles</th>
        <th scope="col">Acciones</th>
      </tr>
    </thead>
    <tbody>
      @for (p of paged(); track p.id) {
        <tr>
          <td class="cell-id">#{{ p.id }}</td>
          <td><code>{{ p.name }}</code></td>
          <td>{{ rolesFor(p) }}</td>
          <td>
            <div class="actions">
              <button type="button" class="btn-outline" *hgHasPermission="'permissions:manage'" (click)="edit(p)">Editar</button>
              <button type="button" class="btn-danger" *hgHasPermission="'permissions:manage'" (click)="deleting.set(p)">Eliminar</button>
            </div>
          </td>
        </tr>
      }
      @if (permissions().length === 0) {
        <tr><td colspan="4" class="empty-state">No hay permisos definidos.</td></tr>
      }
    </tbody>
  </table>
</div>

<div class="pagination">
  <button type="button" class="pg-btn" [disabled]="page() === 1" (click)="prev()" aria-label="Página anterior">←</button>
  @for (n of pages(); track n) {
    <button type="button" class="pg-btn" [class.active]="page() === n" (click)="page.set(n)">{{ n }}</button>
  }
  <button type="button" class="pg-btn" [disabled]="page() === totalPages()" (click)="next()" aria-label="Página siguiente">→</button>
</div>

<app-permission-form-modal
  [open]="openCreate()"
  [existing]="null"
  (close)="openCreate.set(false)"
  (saved)="onCreated($event)"
/>

<app-permission-form-modal
  [open]="editing() !== null"
  [existing]="editing()"
  (close)="editing.set(null)"
  (saved)="onUpdated($event)"
/>

<app-confirm-delete
  [open]="deleting() !== null"
  entityLabel="permiso"
  (cancel)="deleting.set(null)"
  (confirm)="confirmDelete()"
/>
